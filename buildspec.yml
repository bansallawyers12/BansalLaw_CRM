version: 0.2

# CodeBuild packages the repo; CodeDeploy runs scripts/deploy.sh (AfterInstall)
# and scripts/validate.sh (ValidateService) from the repo — not generated in CI.
#
# NEVER run migrations here — CodeBuild has no DB access or production .env.
# NEVER run `npm run dev` — the Vite dev server never exits.
# Use `composer install` in CI (locked); run `composer update` locally and commit composer.lock.

phases:
  install:
    runtime-versions:
      php: 8.2
      nodejs: 20
    commands:
      # Provide a minimal .env so Composer's post-install hook (package:discover) can run.
      # CodeBuild has no production .env; ext-sodium is skipped here (production EC2 has it).
      - |
        if [ ! -f .env ]; then
          if [ -f .env.example ]; then
            cp .env.example .env
          else
            printf 'APP_KEY=base64:%s\nAPP_ENV=production\nAPP_DEBUG=false\n' \
              "$(openssl rand -base64 32)" > .env
          fi
        fi

  pre_build:
    commands:
      - echo "=== composer install (locked) + npm ci + npm run build ==="
      - composer install --no-interaction --no-dev --optimize-autoloader --ignore-platform-reqs
      - npm ci
      - npm run build
      # npm run dev — local Vite only; never enable here (process does not exit)

  build:
    commands:
      # Use scripts/deploy.sh and scripts/validate.sh from the repo. Do not embed copies
      # here — an old heredoc was overwriting the fixed deploy script on every build.
      - echo "=== CodeDeploy hooks from repository ==="
      - mkdir -p scripts
      - test -f scripts/deploy.sh -a -f scripts/validate.sh
      - chmod +x scripts/deploy.sh scripts/validate.sh

cache:
  paths:
    - 'node_modules/**/*'
    - '/root/.composer/cache/**/*'

artifacts:
  files:
    - '**/*'
  exclude-paths:
    - 'node_modules/**/*'
    - 'vendor/**/*'
    - '.git/**/*'
    - 'tests/**/*'
    - '.env'
    - 'storage/framework/**/*'
    - 'storage/logs/**/*'
    - 'bootstrap/cache/**/*'
