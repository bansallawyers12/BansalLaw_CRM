version: 0.2

# CodeBuild packages the repo; CodeDeploy runs scripts/deploy.sh (AfterInstall)
# and scripts/validate.sh (ValidateService) on the production EC2 instance.
#
# NEVER run migrations here — CodeBuild has no DB access or production .env.
# NEVER run `npm run dev` — the Vite dev server never exits.
# Use `composer install` in CI (locked); run `composer update` locally and commit composer.lock.

phases:
  install:
    runtime-versions:
      php: 8.2
      nodejs: 20
    commands:
      # Provide a minimal .env so Composer's post-install hook (package:discover) can run.
      # CodeBuild has no production .env; ext-sodium is skipped here (production EC2 has it).
      - |
        if [ ! -f .env ]; then
          if [ -f .env.example ]; then
            cp .env.example .env
          else
            printf 'APP_KEY=base64:%s\nAPP_ENV=production\nAPP_DEBUG=false\n' \
              "$(openssl rand -base64 32)" > .env
          fi
        fi

  pre_build:
    commands:
      - echo "=== composer install (locked) + npm ci + npm run build ==="
      - composer install --no-interaction --no-dev --optimize-autoloader --ignore-platform-req=ext-sodium --quiet
      - npm ci
      - npm run build
      # npm run dev — local Vite only; never enable here (process does not exit)

  build:
    commands:
      - echo "=== Generating CodeDeploy hook scripts ==="
      - mkdir -p scripts

      # ── scripts/deploy.sh  (AfterInstall lifecycle hook) ─────────────────
      - |
        cat > scripts/deploy.sh << 'DEPLOYEOF'
        #!/bin/bash
        set -eo pipefail

        PROJECT_DIR="/home/bansallawyercrm"
        APP_USER="ubuntu"
        WEB_USER="www-data"
        PHP_FPM="php8.2-fpm"
        SOURCE_DIR="/tmp/bansallawyercrm-build"

        # Resolve PHP binary. ondrej/php PPA installs as php8.2; fallback to php.
        if command -v php8.2 &>/dev/null; then PHP_BIN="php8.2"; else PHP_BIN="php"; fi

        # Resolve Composer binary.
        COMPOSER_BIN="/usr/local/bin/composer"
        [ ! -x "$COMPOSER_BIN" ] && COMPOSER_BIN="$(command -v composer)"

        echo "======================================"
        echo "Deployment starting"
        echo "PHP : $($PHP_BIN -r 'echo PHP_VERSION;')"
        echo "User: $APP_USER  Dir: $PROJECT_DIR"
        echo "======================================"

        # ── [1/11] Maintenance mode ─────────────────────────────────────────
        # /up stays HTTP 200 during maintenance (AppServiceProvider + routes/web.php)
        # so the ALB target group health check keeps passing throughout the deploy.
        # Must cd into PROJECT_DIR: CodeDeploy's cwd is not the app root, and
        # `sudo -u` may not keep the parent shell's working directory.
        if [ -f "$PROJECT_DIR/artisan" ]; then
          echo "[1/11] Enabling maintenance mode..."
          sudo -u $APP_USER bash -c "cd '$PROJECT_DIR' && $PHP_BIN artisan down --retry=60" || true
        else
          echo "[1/11] Skipping maintenance mode (no existing deployment)..."
        fi

        # ── [2/11] Sync build artifact → project directory ──────────────────
        echo "[2/11] Syncing source to project..."
        rsync -a --delete \
          --exclude='.env' \
          --exclude='storage/' \
          --exclude='node_modules/' \
          --exclude='vendor/' \
          "$SOURCE_DIR/" "$PROJECT_DIR/"

        # ── [3/11] Ownership ────────────────────────────────────────────────
        echo "[3/11] Fixing ownership..."
        chown -R $APP_USER:$WEB_USER "$PROJECT_DIR"

        # All composer/artisan runs must use explicit 'cd' — sudo -u can leave cwd in ~ubuntu
        # so 'php artisan' in Composer scripts fails with "Could not open input file: artisan".
        # ── [4/11] Composer ─────────────────────────────────────────────────
        echo "[4/11] Installing Composer dependencies..."
        sudo -u $APP_USER bash -c "cd '$PROJECT_DIR' && $COMPOSER_BIN install \
          --no-dev --optimize-autoloader --no-interaction --quiet"

        # ── [5/11] Python venv ──────────────────────────────────────────────
        # Written to a temp file to avoid quoting/escaping issues with nested heredocs.
        echo "[5/11] Setting up Python virtual environment..."
        cat > /tmp/_setup_venv.sh << 'VENVEOF'
        #!/bin/bash
        set -e
        PROJ_DIR="$1"
        cd "$PROJ_DIR/python_services"

        SYS_PY=$(python3 --version 2>&1 | awk '{print $2}')
        VENV_PY=""
        if [ -f venv/pyvenv.cfg ]; then
            VENV_PY=$(grep "^version = " venv/pyvenv.cfg 2>/dev/null | awk '{print $3}')
        fi

        if [ ! -d venv ] || [ "$SYS_PY" != "$VENV_PY" ]; then
            echo "  Recreating venv (system Python $SYS_PY, previous: ${VENV_PY:-none})..."
            rm -rf venv
            python3 -m venv venv
        fi

        echo "  Installing Python dependencies (Python $SYS_PY)..."
        ./venv/bin/pip install --upgrade pip --quiet
        ./venv/bin/pip install -r requirements.txt --quiet
        echo "  Python venv ready."
        VENVEOF
        sudo -u $APP_USER bash /tmp/_setup_venv.sh "$PROJECT_DIR"
        rm -f /tmp/_setup_venv.sh

        # ── [6/11] Clear config cache so .env changes apply before migrate ──
        echo "[6/11] Clearing config cache..."
        sudo -u $APP_USER bash -c "cd '$PROJECT_DIR' && $PHP_BIN artisan config:clear"

        # ── [7/11] Migrations ───────────────────────────────────────────────
        echo "[7/11] Running migrations..."
        sudo -u $APP_USER bash -c "cd '$PROJECT_DIR' && $PHP_BIN artisan migrate --force"
        # sudo -u $APP_USER bash -c "cd '$PROJECT_DIR' && $PHP_BIN artisan import:reference-master-data"

        # ── [8/11] Required storage / cache directories ─────────────────────
        echo "[8/11] Ensuring required directories..."
        sudo -u $APP_USER bash -c "cd '$PROJECT_DIR' && mkdir -p storage/framework/{sessions,views,cache/data} && mkdir -p bootstrap/cache"

        # ── [9/11] Rebuild framework caches ────────────────────────────────
        echo "[9/11] Rebuilding caches..."
        sudo -u $APP_USER bash -c "cd '$PROJECT_DIR' && $PHP_BIN artisan view:clear"
        sudo -u $APP_USER bash -c "cd '$PROJECT_DIR' && $PHP_BIN artisan config:cache"
        sudo -u $APP_USER bash -c "cd '$PROJECT_DIR' && $PHP_BIN artisan route:cache"
        sudo -u $APP_USER bash -c "cd '$PROJECT_DIR' && $PHP_BIN artisan event:cache"
        sudo -u $APP_USER bash -c "cd '$PROJECT_DIR' && $PHP_BIN artisan storage:link --force"

        # ── [10/11] Permissions ─────────────────────────────────────────────
        echo "[10/11] Fixing permissions..."
        chown -R $APP_USER:$WEB_USER "$PROJECT_DIR/storage" "$PROJECT_DIR/bootstrap/cache"
        chmod -R 775 "$PROJECT_DIR/storage" "$PROJECT_DIR/bootstrap/cache"

        # ── [11/11] Service restarts ────────────────────────────────────────
        echo "[11/11] Restarting services..."

        # Tell queue workers to finish their current job cleanly before the hard restart.
        sudo -u $APP_USER bash -c "cd '$PROJECT_DIR' && $PHP_BIN artisan queue:restart" || true

        RESTART_ERRORS=0
        for SVC in $PHP_FPM bansallaw-queue bansallaw-email migration-python-services; do
            if systemctl is-enabled --quiet "$SVC" 2>/dev/null; then
                if systemctl restart "$SVC"; then
                    echo "  OK   : $SVC restarted"
                else
                    echo "  WARN : $SVC failed to restart — check: systemctl status $SVC"
                    RESTART_ERRORS=$((RESTART_ERRORS + 1))
                fi
            else
                echo "  SKIP : $SVC is not enabled"
            fi
        done

        echo "Reloading web server..."
        if systemctl is-active --quiet apache2; then
            systemctl reload apache2
        elif systemctl is-active --quiet nginx; then
            systemctl reload nginx
        else
            echo "  WARN : no active web server (apache2 / nginx) found"
        fi

        echo "Disabling maintenance mode..."
        sudo -u $APP_USER bash -c "cd '$PROJECT_DIR' && $PHP_BIN artisan up"

        echo "======================================"
        if [ "$RESTART_ERRORS" -gt 0 ]; then
            echo "Deployment DONE with $RESTART_ERRORS service restart warning(s)."
        else
            echo "Deployment complete."
        fi
        echo "======================================"
        DEPLOYEOF

      # ── scripts/validate.sh  (ValidateService lifecycle hook) ────────────
      - |
        cat > scripts/validate.sh << 'VALIDATEEOF'
        #!/bin/bash
        set -e

        # Probe the /up health endpoint on the local web server.
        # The route returns HTTP 200 even during maintenance mode (AppServiceProvider).
        # CodeDeploy calls this hook after AfterInstall; a non-zero exit fails the deployment.
        APP_URL="http://127.0.0.1"
        MAX_WAIT=90
        INTERVAL=5
        ELAPSED=0

        echo "ValidateService: waiting for $APP_URL/up to return HTTP 200 (max ${MAX_WAIT}s)..."
        while [ "$ELAPSED" -lt "$MAX_WAIT" ]; do
            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" \
                --max-time 5 --connect-timeout 3 "$APP_URL/up" 2>/dev/null || echo "000")
            if [ "$HTTP_CODE" = "200" ]; then
                echo "Health check PASSED (HTTP 200) after ${ELAPSED}s."
                exit 0
            fi
            echo "  HTTP $HTTP_CODE after ${ELAPSED}s — retrying in ${INTERVAL}s..."
            sleep "$INTERVAL"
            ELAPSED=$((ELAPSED + INTERVAL))
        done

        echo "ERROR: /up did not return HTTP 200 within ${MAX_WAIT}s. Deployment failed."
        exit 1
        VALIDATEEOF

      - chmod +x scripts/deploy.sh scripts/validate.sh

cache:
  paths:
    - 'node_modules/**/*'
    - '/root/.composer/cache/**/*'

artifacts:
  files:
    - '**/*'
  exclude-paths:
    - 'node_modules/**/*'
    - 'vendor/**/*'
    - '.git/**/*'
    - 'tests/**/*'
    - '.env'
    - 'storage/framework/**/*'
    - 'storage/logs/**/*'
    - 'bootstrap/cache/**/*'
