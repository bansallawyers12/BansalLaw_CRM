version: 0.2

# CodeBuild packages the repo; the generated scripts/deploy.sh runs on the app server
# (e.g. via CodeDeploy / SSH) and performs: composer, migrate --force, npm build, cache, restarts.
# Do not run migrations here in CodeBuild unless this build has DB access and the same .env as production.
#
# npm run dev: local Vite dev server only (HMR). CI and deploy use npm run build — do not run dev in CodeBuild
# or deploy (it never exits). Use `composer install` in CI (locked); run `composer update` locally and commit composer.lock.

phases:
  # Omit this install block if your CodeBuild project uses a custom image that already provides PHP/Node/Composer.
  install:
    runtime-versions:
      php: 8.2
      nodejs: 24
    commands:
      # CodeBuild phpenv PHP often has no loadable sodium module (ini trick fails). Composer still needs to resolve
      # lcobucci/jwt; we only ignore ext-sodium here — production EC2 has sodium; vendor is excluded from artifacts.
      # Laravel post-install runs `php artisan package:discover`; CodeBuild has no .env unless we create one.
      - |
        if [ ! -f .env ]; then
          if [ -f .env.example ]; then cp .env.example .env; else printf 'APP_KEY=base64:%s\nAPP_ENV=production\n' "$(openssl rand -base64 32)" > .env; fi
        fi
  pre_build:
    commands:
      - echo "composer install (locked) + npm build"
      - composer install --no-interaction --no-dev --optimize-autoloader --ignore-platform-req=ext-sodium
      - npm ci
      - npm run build
      # npm run dev — local Vite only; never enable here (process does not exit)
  build:
    commands:
      - echo "======================================"
      - echo "Creating deploy script..."
      - echo "======================================"

      - mkdir -p scripts

      - |
        cat > scripts/deploy.sh << 'DEPLOYEOF'
        #!/bin/bash
        set -e

        PROJECT_DIR="/home/bansallawyercrm"
        APP_USER="ubuntu"
        WEB_USER="www-data"
        PHP_FPM="php8.2-fpm"

        SOURCE_DIR="/tmp/bansallawyercrm-build"

        echo "======================================"
        echo "Starting Deployment..."
        echo "======================================"

        echo "Enabling maintenance mode..."
        sudo -u $APP_USER php artisan down --retry=60 || true

        echo "Syncing source → project..."
        rsync -av --delete \
          --exclude='.env' \
          --exclude='storage/' \
          --exclude='node_modules/' \
          --exclude='vendor/' \
          "$SOURCE_DIR/" "$PROJECT_DIR/"

        echo "Fixing ownership..."
        chown -R $APP_USER:$WEB_USER "$PROJECT_DIR"

        cd "$PROJECT_DIR"

        echo "Updating backend dependencies..."
        sudo -u $APP_USER composer install --no-dev --optimize-autoloader --no-interaction

        # ========================================
        # PYTHON VENV SETUP (SAFE + OPTIMIZED)
        # Inner echo messages must use single quotes — nested " closes bash -lc "..." early.
        # ========================================
        echo "Setting up Python virtual environment..."

        sudo -u $APP_USER bash -lc "
        cd $PROJECT_DIR/python_services

        if [ ! -d 'venv' ]; then
            echo 'Creating new virtual environment...'
            python3 -m venv venv
        fi

        echo 'Installing Python dependencies...'
        ./venv/bin/pip install --upgrade pip >/dev/null 2>&1
        ./venv/bin/pip install -r requirements.txt --quiet
        "

        echo "Clearing config cache (so .env changes apply before migrate)..."
        sudo -u $APP_USER php artisan config:clear

        echo "Running migrations..."
        sudo -u $APP_USER php artisan migrate --force

        # Optional: sync user_roles/branches/teams from PG_REFERENCE_* database (uncomment only if production .env has reference DB and you want this on every deploy)
        # sudo -u $APP_USER php artisan import:reference-master-data

        echo "Building frontend assets..."
        # Assets are pre-built by CodeBuild (public/build/ is in the artifact) — no need to rebuild on the server.

        echo "Ensuring required directories..."
        sudo -u $APP_USER mkdir -p storage/framework/{sessions,views,cache/data}
        sudo -u $APP_USER mkdir -p bootstrap/cache

        echo "Rebuilding caches..."
        sudo -u $APP_USER php artisan config:cache
        sudo -u $APP_USER php artisan route:cache
        sudo -u $APP_USER php artisan event:cache
        sudo -u $APP_USER php artisan storage:link --force

        echo "Fixing permissions..."
        chown -R $APP_USER:$WEB_USER storage
        chown -R $APP_USER:$WEB_USER bootstrap/cache

        chmod -R 775 storage
        chmod -R 775 bootstrap/cache

        # ========================================
        # SERVICE RESTARTS
        # ========================================
        echo "Restarting services..."

        systemctl restart $PHP_FPM || true
        systemctl restart bansallaw-queue || true
        systemctl restart bansallaw-reverb || true
        systemctl restart bansallaw-email || true
        systemctl restart migration-python-services || true

        echo "Reloading web server..."
        if systemctl is-active --quiet apache2; then
            systemctl reload apache2
        elif systemctl is-active --quiet nginx; then
            systemctl reload nginx
        fi

        echo "Disabling maintenance mode..."
        sudo -u $APP_USER php artisan up

        echo "======================================"
        echo "Deployment Complete!"
        echo "======================================"
        DEPLOYEOF

      - chmod +x scripts/deploy.sh

artifacts:
  files:
    - '**/*'
  exclude-paths:
    - 'node_modules/**/*'
    - 'vendor/**/*'
    - '.git/**/*'
    - 'tests/**/*'
