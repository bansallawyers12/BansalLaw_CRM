version: 0.0
os: linux
files:
  - source: /
    destination: /tmp/bansallawyercrm-build
file_exists_behavior: OVERWRITE
hooks:
  AfterInstall:
    - location: scripts/deploy.sh
      # Composer + Python venv + migrations + cache rebuild can take several minutes on a cold deploy.
      timeout: 900
      runas: root
  ValidateService:
    - location: scripts/validate.sh
      # Polls GET /up until HTTP 200 (VALIDATE_MAX_WAIT / default 100s inside the script).
      timeout: 180
      runas: root
